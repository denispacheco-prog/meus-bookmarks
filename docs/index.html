<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%8C</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>📌 Bookmarks</h1>
    <div class="app-header-actions">
      <input
        id="search-input"
        type="search"
        placeholder="Buscar por título, notas, tag ou categoria..."
        autocomplete="off"
      />
      <div class="import-export-row">
        <button id="export-btn" type="button">Exportar</button>
        <button id="import-btn" type="button">Importar</button>
        <input id="import-file-input" type="file" accept="application/json" class="hidden" />
        <button id="github-config-btn" type="button" class="hidden">⚙ GitHub</button>
        <button id="category-manager-btn" type="button">⚙ Categorias</button>
        <button id="action-manager-btn" type="button">⚙ Ações</button>
        <button id="tag-manager-btn" type="button">⚙ Tags</button>
      </div>
      <button id="theme-toggle-btn" type="button" class="theme-toggle-btn" title="Alternar tema"></button>
    </div>
  </header>

  <main>
    <div class="layout">
      <aside class="left-sidebar">
        <div class="category-sidebar">
          <details open>
            <summary>Categorias</summary>
            <nav id="category-menu" class="category-menu"></nav>
          </details>
        </div>
        <div class="action-sidebar">
          <details open>
            <summary>Ações</summary>
            <nav id="action-menu" class="action-menu"></nav>
          </details>
        </div>
      </aside>

      <div class="main-content">
        <section class="toolbar">
          <div id="active-filters" class="active-filters hidden"></div>
          <span id="import-status" class="form-status"></span>
        </section>

        <section class="add-bookmark">
          <details>
            <summary>+ Adicionar novo</summary>
            <form id="add-form">
              <div class="form-row">
                <label for="url">URL *</label>
                <input id="url" name="url" type="url" placeholder="https://exemplo.com" required />
              </div>
              <div class="form-row">
                <label for="title">Título *</label>
                <input id="title" name="title" type="text" placeholder="Título do link" required />
              </div>
              <div class="form-row">
                <label for="description">Notas</label>
                <textarea id="description" name="description" rows="2" placeholder="Opcional"></textarea>
              </div>
              <div class="form-row">
                <label for="tags">Tags</label>
                <div class="tag-input-wrapper">
                  <input id="tags" name="tags" type="text" placeholder="separadas por vírgula" autocomplete="off" />
                  <div class="tag-suggestions hidden"></div>
                </div>
              </div>
              <div class="form-row">
                <label for="action-select">Ação</label>
                <select id="action-select" name="action"></select>
              </div>
              <div class="form-row">
                <label for="new-action">Nova ação (opcional)</label>
                <input id="new-action" name="new-action" type="text" placeholder="ex: ✍️ Estudar" />
              </div>
              <div class="form-row">
                <label>Categorias gerais</label>
                <div id="categories-groups" class="categories-groups"></div>
              </div>
              <div class="form-row new-category-row">
                <label for="new-categories">Nova(s) categoria(s)</label>
                <input id="new-categories" name="new-categories" type="text" placeholder="separadas por vírgula" />
                <select id="new-category-group" name="new-category-group"></select>
              </div>
              <div class="form-actions">
                <button type="submit">Salvar bookmark</button>
                <span id="form-status" class="form-status"></span>
              </div>
            </form>
          </details>
        </section>

        <section>
          <p id="results-count" class="results-count"></p>
          <ul id="bookmark-list" class="bookmark-list"></ul>
          <p id="empty-state" class="empty-state hidden">Nenhum bookmark encontrado.</p>
          <button id="load-more-btn" type="button" class="load-more-btn hidden">Carregar mais</button>
        </section>
      </div>

      <aside class="favorites-sidebar">
        <section id="favorites-section" class="favorites-section hidden">
          <h2 class="favorites-heading">⭐ Favoritos</h2>
          <ul id="favorites-list" class="favorites-list"></ul>
        </section>

        <section id="tag-cloud-section" class="tag-cloud-section hidden">
          <h2 class="tag-cloud-heading">Tags</h2>
          <div id="tag-cloud" class="tag-cloud"></div>
        </section>
      </aside>
    </div>
  </main>

  <div id="category-manager-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Gerenciar categorias">
      <div class="modal-header">
        <h2>Gerenciar categorias</h2>
        <button id="category-manager-close-btn" type="button" class="modal-close-btn">✕</button>
      </div>
      <div id="category-manager-body" class="modal-body"></div>
    </div>
  </div>

  <div id="action-manager-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Gerenciar ações">
      <div class="modal-header">
        <h2>Gerenciar ações</h2>
        <button id="action-manager-close-btn" type="button" class="modal-close-btn">✕</button>
      </div>
      <div id="action-manager-body" class="modal-body"></div>
    </div>
  </div>

  <div id="tag-manager-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Gerenciar tags">
      <div class="modal-header">
        <h2>Gerenciar tags</h2>
        <button id="tag-manager-close-btn" type="button" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <input id="tag-manager-search" type="text" placeholder="Buscar tag..." class="tag-manager-search" autocomplete="off" />
        <ul id="tag-manager-list" class="manager-tag-list"></ul>
      </div>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script src="app.js"></script>
</body>
</html>
